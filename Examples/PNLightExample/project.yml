name: PNLightExample
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

packages:
  PNLightSDK:
    path: ../..

targets:
  PNLightExample:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PNLightExample
        excludes:
          - PNLightConfig.example.swift
          - Products.storekit
      # StoreKit Testing config: kept in the project for editing, but in no build
      # phase — the scheme's Run action uses it; it is never bundled into the app.
      - path: PNLightExample/Products.storekit
        buildPhase: none
    info:
      path: PNLightExample/Info.plist
      properties:
        CFBundleDisplayName: PNLight Example
        UILaunchScreen:
          UIColorName: ""
        NSUserTrackingUsageDescription: "This identifier will be used to deliver personalized ads to you."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.pnlight-example
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: PNLightSDK

schemes:
  PNLightExample:
    build:
      targets:
        PNLightExample: all
    run:
      config: Debug
      # Resolve products locally on the simulator (no App Store Connect / sandbox).
      storeKitConfiguration: PNLightExample/Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
